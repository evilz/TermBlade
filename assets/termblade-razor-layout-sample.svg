  <text x="135" y="385" fill="#ffffff" font-family="monospace" font-size="22">Runtime: .NET 9 + Razor</text>
  <text x="105" y="440" fill="#9ca3af" font-family="monospace" font-size="22">Press q or Esc to exit</text>
</svg>
